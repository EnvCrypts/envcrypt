version: "2"
sql:
  - schema: "internal/db/migrations"
    queries: "internal/db/queries"
    engine: "postgresql"
    gen:
      go:
        out: "database/"
        overrides:
          - db_type: "inet"
            nullable: true
            go_type:
              import: "github.com/vijayvenkatj/envcrypt/internal/db/types"
              type: "NullIP"
          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "github.com/vijayvenkatj/envcrypt/internal/db/types"
              type: "NullJSON"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
